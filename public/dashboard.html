<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen">
    <nav class="bg-black/40 backdrop-blur border-b border-purple-500/20 sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="text-2xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">⚡ VOLTUM</div>
        <div class="flex gap-4 items-center">
          <span class="text-sm" id="userName">DJ</span>
          <a href="#" onclick="verPreskit()" class="px-4 py-2 bg-purple-600 rounded-lg font-bold text-sm">👁️ Ver Preskit</a>
          <button onclick="logout()" class="px-4 py-2 border border-purple-500 rounded-lg font-bold text-sm hover:bg-purple-500/10">Salir</button>
        </div>
      </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-12">
      <h1 class="text-4xl font-black mb-8">📊 Mi Dashboard</h1>
      
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="text-gray-400 text-sm">Visitas</div>
          <div class="text-4xl font-black">1.250</div>
        </div>
        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="text-gray-400 text-sm">Visitantes</div>
          <div class="text-4xl font-black">342</div>
        </div>
        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="text-gray-400 text-sm">Clicks</div>
          <div class="text-4xl font-black">156</div>
        </div>
        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="text-gray-400 text-sm">Eventos</div>
          <div class="text-4xl font-black" id="eventCount">0</div>
        </div>
      </div>

      <!-- EQUIPOS -->
      <div class="mb-12">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-3xl font-bold">🎧 Equipos Donde Toco</h2>
          <button class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg font-bold text-sm" onclick="openEquipmentModal()">+ Agregar</button>
        </div>

        <div id="equipmentList" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

        <div id="emptyEquipment" class="bg-gray-900/50 border border-purple-500/20 rounded-2xl p-8 text-center">
          <i class="fas fa-headphones text-6xl text-purple-500 mb-4 block"></i>
          <p class="text-gray-400 mb-4">Sin equipos seleccionados</p>
          <button class="px-6 py-2 bg-purple-600 rounded-lg font-bold" onclick="openEquipmentModal()">Agregar equipos</button>
        </div>
      </div>

      <!-- EVENTOS -->
      <div class="mb-12">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-bold">📅 Mis Presentaciones</h2>
          <button class="px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold" onclick="showModal()">+ Agregar</button>
        </div>

        <div id="eventsList" class="space-y-4"></div>

        <div id="emptyState" class="bg-gray-900/50 border border-purple-500/20 rounded-2xl p-12 text-center">
          <i class="fas fa-calendar text-6xl text-purple-500 mb-4 block"></i>
          <p class="text-gray-400 mb-4">Sin presentaciones</p>
          <button class="px-6 py-2 bg-purple-600 rounded-lg font-bold" onclick="showModal()">Agregar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL EVENTOS -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur flex items-center justify-center z-50 p-4">
    <div class="bg-gray-900 border border-purple-500/30 rounded-2xl p-8 max-w-md w-full">
      <h2 class="text-2xl font-bold mb-6">Agregar Evento</h2>
      <div class="space-y-4">
        <input type="text" id="eventName" placeholder="Nombre" class="w-full px-3 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
        <input type="date" id="eventDate" class="w-full px-3 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
        <input type="time" id="eventTime" class="w-full px-3 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
        <input type="text" id="eventCity" placeholder="Ciudad" class="w-full px-3 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
        <input type="text" id="eventVenue" placeholder="Lugar" class="w-full px-3 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
        <input type="url" id="eventTicket" placeholder="Link entradas" class="w-full px-3 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white text-sm">
        <div class="flex gap-3">
          <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-purple-500 rounded-lg font-bold">Cancelar</button>
          <button onclick="saveEvent()" class="flex-1 px-4 py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let user = null;
    let eventos = [];
    let equipmentSelected = [];

    const EQUIPOS_DISPONIBLES = [
      { id: 1, name: 'Blondie', city: 'Santiago', icon: '🎪' },
      { id: 2, name: 'Castro', city: 'Santiago', icon: '🎭' },
      { id: 3, name: 'The Clinic', city: 'Santiago', icon: '🎧' },
      { id: 4, name: 'Subterráneo', city: 'Santiago', icon: '🎸' },
      { id: 5, name: 'La Feria', city: 'Santiago', icon: '🎪' },
      { id: 6, name: 'Moods', city: 'Santiago', icon: '🎵' },
      { id: 7, name: 'Sentient', city: 'Santiago', icon: '🔊' },
      { id: 8, name: 'Club Náutico', city: 'Santiago', icon: '⛵' },
      { id: 9, name: 'Garage', city: 'Valparaíso', icon: '🎸' },
      { id: 10, name: 'Tartaglia', city: 'Valparaíso', icon: '🎭' },
      { id: 11, name: 'La Discoteca', city: 'Concepción', icon: '💃' },
      { id: 12, name: 'Club Social', city: 'Concepción', icon: '🎪' },
      { id: 13, name: 'Evento Corporativo', city: 'Varios', icon: '🏢' },
      { id: 14, name: 'Evento Privado', city: 'Varios', icon: '🎉' },
      { id: 15, name: 'Wedding', city: 'Varios', icon: '💒' },
      { id: 16, name: 'Festival', city: 'Varios', icon: '🎪' },
    ];

    function loadData() {
      user = JSON.parse(localStorage.getItem('voltum_user'));
      if (!user) { 
        window.location.href = '/login.html'; 
        return; 
      }
      
      if (!user.subscription || !user.subscription.active) {
        alert('⚠️ Necesitas pagar tu suscripción para acceder');
        window.location.href = '/checkout.html';
        return;
      }
      
      document.getElementById('userName').textContent = user.artist_name || user.username;
      
      const stored = localStorage.getItem(`eventos_${user.id}`);
      eventos = stored ? JSON.parse(stored) : [];
      renderEventos();
      
      loadEquipment();
    }

    function renderEventos() {
      const list = document.getElementById('eventsList');
      const empty = document.getElementById('emptyState');

      if (eventos.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        document.getElementById('eventCount').textContent = '0';
        return;
      }

      empty.classList.add('hidden');
      document.getElementById('eventCount').textContent = eventos.length;

      list.innerHTML = eventos.map((e, i) => `
        <div class="bg-gradient-to-r from-purple-600/20 to-pink-600/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="flex justify-between">
            <div>
              <h3 class="text-xl font-bold">${e.name}</h3>
              <p class="text-gray-400 text-sm">📅 ${e.date}${e.time ? ' ' + e.time : ''}</p>
              <p class="text-gray-400 text-sm">📍 ${e.city || 'N/A'}</p>
            </div>
            <button onclick="deleteEvent(${i})" class="px-2 py-1 bg-red-600 rounded text-xs">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function showModal() { document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function saveEvent() {
      const name = document.getElementById('eventName').value;
      const date = document.getElementById('eventDate').value;

      if (!name || !date) { alert('Rellena nombre y fecha'); return; }

      eventos.push({
        name,
        date,
        time: document.getElementById('eventTime').value,
        city: document.getElementById('eventCity').value,
        venue: document.getElementById('eventVenue').value,
        ticket: document.getElementById('eventTicket').value
      });

      localStorage.setItem(`eventos_${user.id}`, JSON.stringify(eventos));
      closeModal();
      renderEventos();
      alert('✅ Evento agregado');
    }

    function deleteEvent(i) {
      if (!confirm('¿Eliminar?')) return;
      eventos.splice(i, 1);
      localStorage.setItem(`eventos_${user.id}`, JSON.stringify(eventos));
      renderEventos();
    }

    function loadEquipment() {
      const stored = localStorage.getItem(`equipment_${user.id}`);
      equipmentSelected = stored ? JSON.parse(stored) : [];
      renderEquipment();
    }

    function renderEquipment() {
      const list = document.getElementById('equipmentList');
      const empty = document.getElementById('emptyEquipment');

      if (equipmentSelected.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      list.innerHTML = equipmentSelected.map(eq => `
        <div class="bg-gradient-to-br from-purple-600/20 to-pink-600/20 border border-purple-500/30 rounded-xl p-4 flex items-center justify-between hover:border-purple-500/60 transition">
          <div class="flex-1">
            <div class="text-3xl mb-2">${eq.icon}</div>
            <div class="font-bold text-sm">${eq.name}</div>
            <div class="text-xs text-gray-500">${eq.city}</div>
          </div>
          <button onclick="removeEquipment(${eq.id})" class="text-red-400 hover:text-red-500 text-xl">✕</button>
        </div>
      `).join('');
    }

    function openEquipmentModal() {
      const html = `
        <div class="fixed inset-0 bg-black/50 backdrop-blur flex items-center justify-center z-50 p-4">
          <div class="bg-gray-900 border border-purple-500/30 rounded-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6">Selecciona tus Equipos</h2>
            
            <div class="mb-6">
              <input type="text" id="searchEquipo" placeholder="Buscar equipo..." class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white" onkeyup="filterEquipos()">
            </div>

            <div id="equipoList" class="grid grid-cols-2 gap-3 mb-8">
              ${EQUIPOS_DISPONIBLES.map(eq => `
                <label class="flex items-center gap-3 p-3 bg-gray-800 border border-purple-500/30 rounded-lg hover:bg-purple-500/20 cursor-pointer transition">
                  <input type="checkbox" value="${eq.id}" onchange="toggleEquipo(${eq.id}, '${eq.name}', '${eq.city}', '${eq.icon}')" class="w-4 h-4" ${equipmentSelected.find(e => e.id === eq.id) ? 'checked' : ''}>
                  <div class="flex-1">
                    <div class="text-lg">${eq.icon} ${eq.name}</div>
                    <div class="text-xs text-gray-500">${eq.city}</div>
                  </div>
                </label>
              `).join('')}
            </div>

            <div class="flex gap-3">
              <button onclick="closeEquipmentModal()" class="flex-1 px-4 py-2 border border-purple-500 rounded-lg font-bold">Cancelar</button>
              <button onclick="closeEquipmentModal()" class="flex-1 px-4 py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold">Guardar</button>
            </div>
          </div>
        </div>
      `;

      const modal = document.createElement('div');
      modal.id = 'equipmentModal';
      modal.innerHTML = html;
      document.body.appendChild(modal);
    }

    function filterEquipos() {
      const search = document.getElementById('searchEquipo').value.toLowerCase();
      const items = document.querySelectorAll('#equipoList label');
      items.forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(search) ? 'flex' : 'none';
      });
    }

    function toggleEquipo(id, name, city, icon) {
      const exists = equipmentSelected.find(e => e.id === id);
      if (exists) {
        equipmentSelected = equipmentSelected.filter(e => e.id !== id);
      } else {
        equipmentSelected.push({ id, name, city, icon });
      }
      localStorage.setItem(`equipment_${user.id}`, JSON.stringify(equipmentSelected));
    }

    function removeEquipment(id) {
      equipmentSelected = equipmentSelected.filter(e => e.id !== id);
      localStorage.setItem(`equipment_${user.id}`, JSON.stringify(equipmentSelected));
      renderEquipment();
    }

    function closeEquipmentModal() {
      const modal = document.getElementById('equipmentModal');
      if (modal) modal.remove();
      loadEquipment();
    }

    function verPreskit() {
      if (!user) return;
      window.location.href = '/dj/' + user.username;
    }

    function logout() {
      localStorage.removeItem('voltum_user');
      window.location.href = '/login.html';
    }

    window.addEventListener('load', loadData);
  </script>
</body>
</html>
