<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8">
        <div class="text-center mb-8">
          <div class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">⚡ VOLTUM</div>
          <p class="text-gray-400">Tu preskit profesional en minutos</p>
        </div>

        <div class="space-y-4">
          <div class="flex gap-2 mb-6">
            <button id="btnLogin" onclick="mostrarLogin()" class="flex-1 py-2 bg-purple-600 rounded-lg font-bold">Ingresar</button>
            <button id="btnSignup" onclick="mostrarSignup()" class="flex-1 py-2 border border-purple-500 rounded-lg font-bold hover:bg-purple-500/10">Crear Cuenta</button>
          </div>

          <!-- FORM LOGIN -->
          <div id="formLogin" class="space-y-4">
            <input type="email" id="loginEmail" placeholder="tu@email.com" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
            <input type="password" id="loginPassword" placeholder="Contraseña" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
            <button onclick="hacerLogin()" class="w-full py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold hover:opacity-90">Ingresar</button>
            <p class="text-sm text-gray-400 text-center"><a href="#" onclick="mostrarSignup()" class="text-purple-400">¿Sin cuenta? Crear aquí</a></p>
          </div>

          <!-- FORM SIGNUP -->
          <div id="formSignup" class="space-y-4 hidden">
            <input type="email" id="signupEmail" placeholder="tu@email.com" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
            <input type="text" id="signupUsername" placeholder="dj-nombre" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
            <p class="text-xs text-gray-500">Tu preskit: voltum.cl/dj/dj-nombre</p>
            <input type="text" id="signupArtist" placeholder="Nombre Artístico" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
            <input type="password" id="signupPassword" placeholder="Mínimo 6 caracteres" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
            <div class="bg-purple-500/10 border border-purple-500/30 rounded-lg p-3">
              <p class="text-xs text-gray-300">💳 Suscripción: <span class="font-bold">$10.000 CLP/mes</span></p>
            </div>
            <button onclick="hacerSignup()" class="w-full py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold hover:opacity-90">Crear Cuenta</button>
            <p class="text-sm text-gray-400 text-center"><a href="#" onclick="mostrarLogin()" class="text-purple-400">¿Ya tienes cuenta? Ingresa aquí</a></p>
          </div>
        </div>

        <div class="mt-8 pt-8 border-t border-purple-500/20">
          <p class="text-sm text-gray-400 text-center mb-3">¿Quieres ver cómo funciona?</p>
          <a href="/demo.html" class="block text-center py-2 border border-purple-500 rounded-lg font-bold hover:bg-purple-500/10">👀 Ver Demo</a>
        </div>
      </div>

      <div class="text-center mt-6 text-sm text-gray-500">
        <a href="/" class="hover:text-gray-300">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script>
    const sbURL = 'https://btwrbjqvnwxxsyhipjta.supabase.co';
    const sbKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0d3JianF2bnd4eHN5aGlwanRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTc1NDgsImV4cCI6MjA5MDQzMzU0OH0.ZFItnsTbRkVSz4Ut7JH7iccOZZPxiycsK36KgYEG7Tk';
    const supabase = window.supabase.createClient(sbURL, sbKEY);

    function mostrarLogin() {
      document.getElementById('formLogin').classList.remove('hidden');
      document.getElementById('formSignup').classList.add('hidden');
      document.getElementById('btnLogin').classList.add('bg-purple-600');
      document.getElementById('btnLogin').classList.remove('border', 'border-purple-500');
      document.getElementById('btnSignup').classList.remove('bg-purple-600');
      document.getElementById('btnSignup').classList.add('border', 'border-purple-500');
    }

    function mostrarSignup() {
      document.getElementById('formSignup').classList.remove('hidden');
      document.getElementById('formLogin').classList.add('hidden');
      document.getElementById('btnSignup').classList.add('bg-purple-600');
      document.getElementById('btnSignup').classList.remove('border', 'border-purple-500');
      document.getElementById('btnLogin').classList.remove('bg-purple-600');
      document.getElementById('btnLogin').classList.add('border', 'border-purple-500');
    }

    async function hacerLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        alert('⚠️ Rellena todos los campos');
        return;
      }

      try {
        const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('password_hash', password).single();
        if (error || !data) {
          alert('❌ Email o contraseña incorrectos');
          return;
        }
        localStorage.setItem('voltum_user', JSON.stringify(data));
        window.location.href = '/dashboard.html';
      } catch (e) {
        alert('❌ Error: ' + e.message);
      }
    }

    async function hacerSignup() {
      const email = document.getElementById('signupEmail').value.trim();
      const username = document.getElementById('signupUsername').value.trim();
      const artist = document.getElementById('signupArtist').value.trim();
      const password = document.getElementById('signupPassword').value;

      if (!email || !username || !artist || !password) {
        alert('⚠️ Rellena todos los campos');
        return;
      }

      if (password.length < 6) {
        alert('⚠️ Contraseña debe tener al menos 6 caracteres');
        return;
      }

      try {
        const { data, error } = await supabase.from('users').insert([{
          email, username, artist_name: artist, password_hash: password, role: 'dj'
        }]).select().single();

        if (error) {
          alert('❌ Error: ' + (error.message.includes('duplicate') ? 'Email o usuario ya existe' : error.message));
          return;
        }

        await supabase.from('prestskits').insert([{ user_id: data.id }]);
        localStorage.setItem('voltum_user', JSON.stringify(data));
        alert('✅ Cuenta creada\n\nAhora irás a pagar la suscripción de $10.000 CLP');
        // AQUÍ IRÍA STRIPE CHECKOUT (PASO 4)
        window.location.href = '/dashboard.html';
      } catch (e) {
        alert('❌ Error: ' + e.message);
      }
    }

    window.addEventListener('load', () => {
      const user = localStorage.getItem('voltum_user');
      if (user) window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
