<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8">
        <div class="text-center mb-8">
          <div class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">⚡ VOLTUM</div>
          <p class="text-gray-400">Tu preskit profesional</p>
        </div>

        <div id="loginTab" class="space-y-4">
          <div class="flex gap-2 mb-6">
            <button class="flex-1 py-2 bg-purple-600 rounded-lg font-bold" onclick="tab('login')">Ingresar</button>
            <button class="flex-1 py-2 border border-purple-500 rounded-lg font-bold" onclick="tab('signup')">Crear</button>
          </div>
          <input type="email" id="email" placeholder="Email" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <input type="password" id="pass" placeholder="Contraseña" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <button onclick="login()" class="w-full py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold">Ingresar</button>
        </div>

        <div id="signupTab" class="space-y-4 hidden">
          <div class="flex gap-2 mb-6">
            <button class="flex-1 py-2 border border-purple-500 rounded-lg font-bold" onclick="tab('login')">Ingresar</button>
            <button class="flex-1 py-2 bg-purple-600 rounded-lg font-bold" onclick="tab('signup')">Crear</button>
          </div>
          <input type="email" id="signEmail" placeholder="Email" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <input type="text" id="signUser" placeholder="Usuario (ej: dj-phoenix)" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <input type="text" id="signArtist" placeholder="Nombre artístico" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <input type="password" id="signPass" placeholder="Contraseña" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <p class="text-xs text-gray-500">Suscripción: $10.000 CLP/mes</p>
          <button onclick="signup()" class="w-full py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold">Crear Cuenta</button>
        </div>

        <div class="mt-8 pt-8 border-t border-purple-500/20">
          <a href="/demo.html" class="block text-center py-2 border border-purple-500 rounded-lg font-bold hover:bg-purple-500/10">👀 Ver Demo</a>
        </div>
      </div>
      <div class="text-center mt-6"><a href="/" class="text-gray-500 hover:text-gray-300">← Inicio</a></div>
    </div>
  </div>

  <script>
    function tab(t) {
      document.getElementById('loginTab').classList.toggle('hidden', t !== 'login');
      document.getElementById('signupTab').classList.toggle('hidden', t !== 'signup');
    }

    function login() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      if (!email || !pass) { alert('Rellena todo'); return; }

      const users = JSON.parse(localStorage.getItem('voltum_users') || '[]');
      const user = users.find(u => u.email === email && u.password === pass);
      
      if (!user) { alert('Credenciales incorrectas'); return; }
      localStorage.setItem('voltum_user', JSON.stringify(user));
      window.location.href = '/dashboard.html';
    }

    function signup() {
      const email = document.getElementById('signEmail').value;
      const user = document.getElementById('signUser').value;
      const artist = document.getElementById('signArtist').value;
      const pass = document.getElementById('signPass').value;

      if (!email || !user || !artist || !pass) { alert('Rellena todo'); return; }
      if (pass.length < 6) { alert('Contraseña mínimo 6 caracteres'); return; }

      const users = JSON.parse(localStorage.getItem('voltum_users') || '[]');
      if (users.find(u => u.email === email)) { alert('Email ya existe'); return; }

      const newUser = { id: Date.now(), email, username: user, artist_name: artist, password: pass, role: 'dj', created: new Date().toISOString() };
      users.push(newUser);
      localStorage.setItem('voltum_users', JSON.stringify(users));
      localStorage.setItem('voltum_user', JSON.stringify(newUser));
      
      alert('✅ Cuenta creada\nAhora irás a tu dashboard');
      window.location.href = '/dashboard.html';
    }

    if (localStorage.getItem('voltum_user')) window.location.href = '/dashboard.html';
  </script>
</body>
</html>
