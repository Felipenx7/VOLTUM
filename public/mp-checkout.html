<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago Mercado Pago - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8 text-center">
        <div class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-4">⚡ VOLTUM</div>
        
        <div class="my-8">
          <i class="fas fa-spinner fa-spin text-5xl text-pink-500 block mb-4"></i>
          <h2 class="text-2xl font-bold mb-2">Preparando tu pago...</h2>
          <p class="text-gray-400 mb-4">Será redirigido a Mercado Pago en segundos</p>
          
          <div class="bg-purple-500/10 border border-purple-500/30 rounded-lg p-6 mb-6 text-left">
            <p class="text-sm text-gray-300 mb-2"><strong>Plan:</strong> PRO Mensual</p>
            <p class="text-sm text-gray-300"><strong>Monto:</strong> $10.000 CLP</p>
          </div>
        </div>

        <a href="/checkout.html" class="text-xs text-gray-500 hover:text-gray-300">
          ← Si no se redirige, haz click aquí
        </a>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', async function() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');
      const name = params.get('name');
      const phone = params.get('phone');
      const user_id = params.get('user_id');

      console.log('Datos de pago:', { email, name, phone, user_id });

      try {
        // Crear preferencia manualmente
        const preference = {
          items: [
            {
              title: 'VOLTUM - Plan PRO Mensual',
              description: 'Suscripción mensual a VOLTUM DJ Preskit',
              quantity: 1,
              currency_id: 'CLP',
              unit_price: 10000
            }
          ],
          payer: {
            name: name,
            email: email,
            phone: {
              area_code: '56',
              number: phone
            }
          },
          external_reference: user_id + '_' + Date.now()
        };

        console.log('Enviando preferencia...');

        // Enviar a backend para crear preferencia (usaremos un webhook)
        const response = await fetch('https://api.mercadopago.com/checkout/preferences', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer APP_USR-156a78c3-c148-44de-8f1b-9d97e23ebbdf'
          },
          body: JSON.stringify(preference)
        });

        if (response.ok) {
          const data = await response.json();
          console.log('Preferencia creada:', data.id);
          
          // Redirigir a Mercado Pago
          if (data.init_point) {
            window.location.href = data.init_point;
          } else {
            throw new Error('No se obtuvo init_point');
          }
        } else {
          const error = await response.json();
          console.error('Error API:', error);
          
          // Si falla, mostrar formulario de pago alternativo
          mostrarFormularioPago(email, name, phone);
        }

      } catch (error) {
        console.error('Error:', error);
        mostrarFormularioPago(email, name, phone);
      }

      function mostrarFormularioPago(email, name, phone) {
        document.body.innerHTML = `
          <div class="min-h-screen bg-gradient-to-b from-black via-purple-900/20 to-black text-white flex items-center justify-center p-4">
            <div class="w-full max-w-md">
              <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8">
                <h2 class="text-2xl font-bold mb-6 text-center">Completar Pago</h2>
                
                <div class="bg-purple-500/10 border border-purple-500/30 rounded-lg p-6 mb-6">
                  <p class="text-sm text-gray-300 mb-2"><strong>Email:</strong> ${email}</p>
                  <p class="text-sm text-gray-300 mb-2"><strong>Nombre:</strong> ${name}</p>
                  <p class="text-sm text-gray-300"><strong>Monto:</strong> $10.000 CLP</p>
                </div>

                <p class="text-center text-gray-400 mb-4">
                  Por favor, dirígete a <strong>www.mercadopago.cl</strong> para completar tu pago.
                </p>

                <p class="text-xs text-gray-500 text-center">
                  ID de transacción: <code class="bg-gray-800 px-2 py-1 rounded">${Date.now()}</code>
                </p>

                <div class="mt-6 space-y-2">
                  <a href="https://www.mercadopago.cl" target="_blank" class="block w-full py-3 bg-gradient-to-r from-yellow-500 to-yellow-600 rounded-lg font-bold text-center hover:opacity-90">
                    Ir a Mercado Pago
                  </a>
                  <a href="/dashboard.html" class="block w-full py-3 border border-purple-500 rounded-lg font-bold text-center hover:bg-purple-500/10">
                    Ir a Mi Dashboard
                  </a>
                </div>
              </div>
            </div>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
