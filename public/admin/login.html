<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8">
        <div class="text-center mb-8">
          <div class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">⚡ VOLTUM</div>
          <p class="text-gray-400">Panel Admin</p>
        </div>

        <div class="space-y-4">
          <input type="email" id="email" placeholder="Email admin" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <input type="password" id="pass" placeholder="Contraseña" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <button onclick="loginAdmin()" class="w-full py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold">Ingresar</button>
        </div>

        <div class="text-center mt-6"><a href="/" class="text-gray-500 hover:text-gray-300">← Inicio</a></div>
      </div>
    </div>
  </div>

  <script>
    function loginAdmin() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;

      // Credencial admin hardcodeada por ahora
      if (email === 'gerencia@voltum.cl' && pass === 'gerencia123') {
        const admin = { id: 1, email, role: 'admin', name: 'Admin' };
        localStorage.setItem('voltum_admin', JSON.stringify(admin));
        window.location.href = '/admin/dashboard.html';
      } else {
        alert('❌ Credenciales incorrectas');
      }
    }

    if (localStorage.getItem('voltum_admin')) window.location.href = '/admin/dashboard.html';
  </script>
</body>
</html>
