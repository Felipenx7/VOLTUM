<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8">
        <div class="text-center mb-8">
          <div class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">⚡ VOLTUM</div>
          <p class="text-gray-400">Panel de Administración</p>
        </div>

        <div class="space-y-4 mb-6">
          <input type="email" id="adminEmail" placeholder="admin@voltum.cl" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <input type="password" id="adminPassword" placeholder="Contraseña" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          <button onclick="loginAdmin()" class="w-full py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold hover:opacity-90">Ingresar al Panel</button>
        </div>

        <div class="text-center text-sm text-gray-500">
          <a href="/" class="hover:text-gray-300">← Volver al inicio</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sbURL = 'https://btwrbjqvnwxxsyhipjta.supabase.co';
    const sbKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0d3JianF2bnd4eHN5aGlwanRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTc1NDgsImV4cCI6MjA5MDQzMzU0OH0.ZFItnsTbRkVSz4Ut7JH7iccOZZPxiycsK36KgYEG7Tk';
    const supabase = window.supabase.createClient(sbURL, sbKEY);

    async function loginAdmin() {
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;

      if (!email || !password) {
        alert('⚠️ Rellena todos los campos');
        return;
      }

      try {
        const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('role', 'admin').eq('password_hash', password).single();

        if (error || !data) {
          alert('❌ Credenciales incorrectas');
          return;
        }

        localStorage.setItem('voltum_admin', JSON.stringify(data));
        window.location.href = '/admin/dashboard.html';
      } catch (e) {
        alert('❌ Error: ' + e.message);
      }
    }

    window.addEventListener('load', () => {
      const admin = localStorage.getItem('voltum_admin');
      if (admin) window.location.href = '/admin/dashboard.html';
    });
  </script>
</body>
</html>
