<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Dashboard - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen">
    <!-- NAV -->
    <nav class="bg-black/40 backdrop-blur border-b border-purple-500/20 sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="text-2xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">
          ⚡ VOLTUM - Email Manager
        </div>
        <a href="/admin/dashboard.html" class="px-4 py-2 border border-purple-500 rounded-lg font-bold text-sm">← Dashboard</a>
      </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-12">

      <!-- STATS -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-gradient-to-br from-purple-600/20 to-pink-600/20 border border-purple-500/30 rounded-xl p-6">
          <div class="text-3xl font-black text-purple-400 mb-2" id="totalEmails">0</div>
          <div class="text-gray-400 text-sm">Emails Enviados</div>
        </div>
        <div class="bg-gradient-to-br from-blue-600/20 to-cyan-600/20 border border-blue-500/30 rounded-xl p-6">
          <div class="text-3xl font-black text-blue-400 mb-2" id="openRate">0%</div>
          <div class="text-gray-400 text-sm">Tasa de Apertura</div>
        </div>
        <div class="bg-gradient-to-br from-green-600/20 to-emerald-600/20 border border-green-500/30 rounded-xl p-6">
          <div class="text-3xl font-black text-green-400 mb-2" id="clickRate">0%</div>
          <div class="text-gray-400 text-sm">Tasa de Clicks</div>
        </div>
        <div class="bg-gradient-to-br from-pink-600/20 to-orange-600/20 border border-pink-500/30 rounded-xl p-6">
          <div class="text-3xl font-black text-pink-400 mb-2" id="revenue">$0</div>
          <div class="text-gray-400 text-sm">Ingresos (Emails Pagados)</div>
        </div>
      </div>

      <!-- EMAIL TYPES -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-gray-900/50 border border-purple-500/30 rounded-xl p-6 text-center">
          <i class="fas fa-envelope text-2xl text-purple-400 mb-3 block"></i>
          <div class="text-2xl font-bold" id="welcomeCount">0</div>
          <div class="text-xs text-gray-400 mt-2">Bienvenida</div>
        </div>
        <div class="bg-gray-900/50 border border-green-500/30 rounded-xl p-6 text-center">
          <i class="fas fa-check-circle text-2xl text-green-400 mb-3 block"></i>
          <div class="text-2xl font-bold" id="paymentCount">0</div>
          <div class="text-xs text-gray-400 mt-2">Confirmación Pago</div>
        </div>
        <div class="bg-gray-900/50 border border-blue-500/30 rounded-xl p-6 text-center">
          <i class="fas fa-bell text-2xl text-blue-400 mb-3 block"></i>
          <div class="text-2xl font-bold" id="renewalCount">0</div>
          <div class="text-xs text-gray-400 mt-2">Renovación</div>
        </div>
        <div class="bg-gray-900/50 border border-pink-500/30 rounded-xl p-6 text-center">
          <i class="fas fa-newspaper text-2xl text-pink-400 mb-3 block"></i>
          <div class="text-2xl font-bold" id="newsletterCount">0</div>
          <div class="text-xs text-gray-400 mt-2">Newsletter</div>
        </div>
      </div>

      <!-- EMAIL LOG -->
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-6">
        <h3 class="text-xl font-bold mb-6">📬 Historial de Emails</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-purple-500/20">
                <th class="text-left py-3 px-4 text-gray-400 font-bold">Fecha</th>
                <th class="text-left py-3 px-4 text-gray-400 font-bold">Destinatario</th>
                <th class="text-left py-3 px-4 text-gray-400 font-bold">Asunto</th>
                <th class="text-left py-3 px-4 text-gray-400 font-bold">Tipo</th>
                <th class="text-left py-3 px-4 text-gray-400 font-bold">Estado</th>
                <th class="text-left py-3 px-4 text-gray-400 font-bold">Abierto</th>
              </tr>
            </thead>
            <tbody id="emailTable">
              <!-- Se genera dinámicamente -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- TEST EMAILS -->
      <div class="mt-8 bg-gray-900/50 border border-purple-500/30 rounded-2xl p-6">
        <h3 class="text-xl font-bold mb-6">📧 Enviar Emails de Prueba</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button onclick="sendTestWelcome()" class="px-4 py-2 bg-purple-600 rounded-lg font-bold text-sm hover:bg-purple-700">Enviar Welcome</button>
          <button onclick="sendTestPayment()" class="px-4 py-2 bg-green-600 rounded-lg font-bold text-sm hover:bg-green-700">Enviar Payment Confirmation</button>
          <button onclick="sendTestRenewal7()" class="px-4 py-2 bg-blue-600 rounded-lg font-bold text-sm hover:bg-blue-700">Enviar Reminder 7 días</button>
          <button onclick="sendTestNewsletter()" class="px-4 py-2 bg-pink-600 rounded-lg font-bold text-sm hover:bg-pink-700">Enviar Newsletter</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/email-service.js"></script>
  <script>
    function loadEmailDashboard() {
      const admin = JSON.parse(localStorage.getItem('voltum_admin') || 'null');
      if (!admin) {
        window.location.replace('/admin/login.html');
        return;
      }

      const stats = emailService.getEmailStats();
      const users = JSON.parse(localStorage.getItem('voltum_users') || '[]');
      const activeUsers = users.filter(u => u.subscription && u.subscription.active).length;

      // Stats
      document.getElementById('totalEmails').textContent = stats.total;
      document.getElementById('openRate').textContent = stats.total > 0 ? Math.round((stats.opened / stats.total) * 100) : 0 + '%';
      document.getElementById('clickRate').textContent = stats.total > 0 ? Math.round((stats.clicked / stats.total) * 100) : 0 + '%';
      document.getElementById('revenue').textContent = '$' + (activeUsers * 10000).toLocaleString('es-CL');

      // Email types
      document.getElementById('welcomeCount').textContent = stats.byType.welcome;
      document.getElementById('paymentCount').textContent = stats.byType.payment;
      document.getElementById('renewalCount').textContent = stats.byType.renewal;
      document.getElementById('newsletterCount').textContent = stats.byType.newsletter;

      // Email table
      renderEmailTable();
    }

    function renderEmailTable() {
      const table = document.getElementById('emailTable');
      const emails = emailService.emails.slice().reverse().slice(0, 20);
      
      table.innerHTML = '';
      emails.forEach(email => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-purple-500/10 hover:bg-purple-500/5';
        const date = new Date(email.sentAt).toLocaleString('es-CL');
        tr.innerHTML = `
          <td class="py-3 px-4 text-xs">${date}</td>
          <td class="py-3 px-4 text-sm">${email.to}</td>
          <td class="py-3 px-4 text-sm max-w-xs truncate">${email.subject}</td>
          <td class="py-3 px-4"><span class="text-xs bg-purple-600/30 px-2 py-1 rounded">${email.type}</span></td>
          <td class="py-3 px-4"><span class="text-xs text-green-400">✓ ${email.status}</span></td>
          <td class="py-3 px-4">${email.opened ? '✓ Abierto' : '- No abierto'}</td>
        `;
        table.appendChild(tr);
      });
    }

    function sendTestWelcome() {
      const testUser = { email: 'Gerencia@voltum.cl', artist_name: 'Test DJ', username: 'test' };
      emailService.sendWelcomeEmail(testUser);
      alert('✅ Email de bienvenida enviado a Gerencia@voltum.cl');
      loadEmailDashboard();
    }

    function sendTestPayment() {
      const testUser = { email: 'Gerencia@voltum.cl', artist_name: 'Test DJ' };
      emailService.sendPaymentConfirmation(testUser);
      alert('✅ Email de confirmación de pago enviado');
      loadEmailDashboard();
    }

    function sendTestRenewal7() {
      const testUser = { email: 'Gerencia@voltum.cl', artist_name: 'Test DJ' };
      emailService.sendRenewalReminder7Days(testUser);
      alert('✅ Email de recordatorio (7 días) enviado');
      loadEmailDashboard();
    }

    function sendTestNewsletter() {
      const testUser = { email: 'Gerencia@voltum.cl', artist_name: 'Test DJ' };
      emailService.sendWeeklyNewsletter(testUser);
      alert('✅ Newsletter enviada');
      loadEmailDashboard();
    }

    window.addEventListener('load', loadEmailDashboard);
  </script>
</body>
</html>
