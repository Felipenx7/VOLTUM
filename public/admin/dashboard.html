<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen">
    <nav class="bg-black/40 backdrop-blur border-b border-purple-500/20 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="text-2xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">⚡ VOLTUM ADMIN</div>
        <button onclick="logout()" class="px-4 py-2 bg-red-600 rounded-lg font-bold text-sm">Salir</button>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-12">
      <h1 class="text-4xl font-black mb-12">📊 Panel Control</h1>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="text-gray-400 text-sm mb-2">DJs Activos</div>
          <div class="text-4xl font-black" id="djCount">0</div>
        </div>
        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="text-gray-400 text-sm mb-2">Ingresos</div>
          <div class="text-4xl font-black" id="ingresos">$0</div>
        </div>
        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="text-gray-400 text-sm mb-2">Renovaciones</div>
          <div class="text-4xl font-black">0</div>
        </div>
        <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl p-6">
          <div class="text-gray-400 text-sm mb-2">Retención</div>
          <div class="text-4xl font-black">100%</div>
        </div>
      </div>

      <div class="bg-gray-900/50 border border-purple-500/20 rounded-2xl p-6">
        <h2 class="text-2xl font-bold mb-6">👥 DJs Registrados</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="border-b border-purple-500/20">
              <tr class="text-gray-400">
                <th class="text-left py-3">Nombre</th>
                <th class="text-left py-3">Email</th>
                <th class="text-left py-3">Usuario</th>
                <th class="text-left py-3">Estado</th>
                <th class="text-left py-3">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaDJs" class="divide-y divide-purple-500/10"></tbody>
          </table>
        </div>
        <div id="emptyTable" class="text-center py-12 text-gray-400">
          <p>No hay DJs registrados</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let admin = null;
    let djs = [];

    function loadData() {
      admin = JSON.parse(localStorage.getItem('voltum_admin'));
      if (!admin) { window.location.href = '/admin/login.html'; return; }

      const users = JSON.parse(localStorage.getItem('voltum_users') || '[]');
      djs = users.filter(u => u.role === 'dj');

      document.getElementById('djCount').textContent = djs.length;
      document.getElementById('ingresos').textContent = '$' + (djs.length * 10000).toLocaleString();

      const tabla = document.getElementById('tablaDJs');
      const empty = document.getElementById('emptyTable');

      if (djs.length === 0) {
        tabla.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      tabla.innerHTML = djs.map(dj => `
        <tr class="hover:bg-purple-500/5">
          <td class="py-3 font-bold">${dj.artist_name}</td>
          <td class="py-3 text-gray-400">${dj.email}</td>
          <td class="py-3 text-gray-400">@${dj.username}</td>
          <td class="py-3"><span class="px-2 py-1 bg-green-500/20 text-green-400 rounded text-xs">✅ Activo</span></td>
          <td class="py-3"><a href="/dj/${dj.username}" class="px-2 py-1 bg-purple-600 rounded text-xs">👁️ Ver Preskit</a></td>
        </tr>
      `).join('');
    }

    function logout() {
      localStorage.removeItem('voltum_admin');
      window.location.href = '/';
    }

    window.addEventListener('load', loadData);
  </script>
</body>
</html>
