<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/email-service.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8">
        <div class="text-center mb-8">
          <div class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">⚡ VOLTUM</div>
          <p class="text-gray-400">Plan PRO - Suscripción Mensual</p>
        </div>

        <div class="bg-purple-500/10 border border-purple-500/30 rounded-2xl p-6 mb-8">
          <div class="flex justify-between mb-4">
            <span class="text-gray-400">Plan PRO Mensual</span>
            <span class="font-bold">$10.000</span>
          </div>
          <div class="flex justify-between mb-4">
            <span class="text-gray-400">Renovación</span>
            <span class="font-bold">Automática</span>
          </div>
          <div class="border-t border-purple-500/20 pt-4 flex justify-between">
            <span class="text-lg font-bold">Total</span>
            <span class="text-2xl font-black text-pink-400">$10.000 CLP</span>
          </div>
        </div>

        <form id="paymentForm" class="space-y-4">
          <div>
            <label class="block text-sm text-gray-400 mb-2">Email</label>
            <input type="email" id="email" placeholder="tu@email.com" required class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-500/60">
          </div>

          <div>
            <label class="block text-sm text-gray-400 mb-2">Nombre Completo</label>
            <input type="text" id="fullName" placeholder="Tu nombre" required class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-500/60">
          </div>

          <div>
            <label class="block text-sm text-gray-400 mb-2">Teléfono</label>
            <input type="tel" id="phone" placeholder="9 3039 4883" required class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-500/60">
          </div>

          <div id="paymentError" class="text-red-400 text-sm hidden"></div>

          <div class="text-xs text-gray-500 flex items-center gap-2 bg-gray-800/50 p-3 rounded-lg">
            <i class="fas fa-lock text-green-400"></i>
            <span>100% seguro con Mercado Pago</span>
          </div>

          <button type="submit" id="submitBtn" class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold hover:opacity-90 disabled:opacity-50 transition">
            💳 Ir a Pagar $10.000 CLP
          </button>

          <p class="text-xs text-gray-500 text-center">
            Procesado por <strong>Mercado Pago</strong>
          </p>
        </form>

        <div class="mt-8 pt-8 border-t border-purple-500/20 text-center">
          <a href="/login.html" class="text-gray-500 hover:text-gray-300">← Volver a Login</a>
        </div>
      </div>

      <div class="mt-6 bg-gray-900/50 border border-green-500/30 rounded-lg p-4 text-center">
        <div class="flex items-center justify-center gap-2 mb-3">
          <i class="fas fa-shield-alt text-green-400"></i>
          <span class="font-bold text-green-400">Pago 100% Seguro</span>
        </div>
        <p class="text-xs text-gray-400">
          ✓ Encriptación SSL<br>
          ✓ Protección contra fraude<br>
          ✓ Garantía Mercado Pago
        </p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('paymentForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('paymentError');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();

      errorDiv.classList.add('hidden');

      if (!email || !fullName || !phone) {
        errorDiv.textContent = '⚠️ Por favor completa todos los campos';
        errorDiv.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redirigiendo...';

      try {
        const user = JSON.parse(localStorage.getItem('voltum_user'));

        if (!user) {
          throw new Error('Usuario no encontrado');
        }

        // Guardar datos del pago en localStorage antes de redirigir
        user.pendingPayment = {
          email: email,
          fullName: fullName,
          phone: phone,
          amount: 10000,
          createdAt: new Date().toISOString()
        };

        localStorage.setItem('voltum_user', JSON.stringify(user));

        // Crear un link de pago simple con Mercado Pago
        const paymentLink = `https://www.mercadopago.cl/checkout/v1/redirect?pref_id=`;
        
        // Redirigir a un formulario de pago simple
        // Usando el método POST a Mercado Pago
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = 'https://www.mercadopago.cl/integrations/payment-brick/v1/payments';
        form.style.display = 'none';

        // Campo de transacción
        const amountField = document.createElement('input');
        amountField.type = 'hidden';
        amountField.name = 'amount';
        amountField.value = '10000';
        form.appendChild(amountField);

        const emailField = document.createElement('input');
        emailField.type = 'hidden';
        emailField.name = 'payer_email';
        emailField.value = email;
        form.appendChild(emailField);

        const nameField = document.createElement('input');
        nameField.type = 'hidden';
        nameField.name = 'payer_name';
        nameField.value = fullName;
        form.appendChild(nameField);

        // Por ahora, crear un link simple de checkout
        // Redirigir a página de pago alternativa
        const checkoutURL = `/mp-checkout.html?email=${encodeURIComponent(email)}&name=${encodeURIComponent(fullName)}&phone=${encodeURIComponent(phone)}&user_id=${user.id}`;
        
        window.location.href = checkoutURL;

      } catch (error) {
        console.error('Error:', error);
        errorDiv.textContent = '❌ ' + error.message;
        errorDiv.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '💳 Ir a Pagar $10.000 CLP';
      }
    });

    window.addEventListener('load', function() {
      const user = JSON.parse(localStorage.getItem('voltum_user') || 'null');
      if (user && user.subscription && user.subscription.active) {
        window.location.replace('/dashboard.html');
      }
    });
  </script>
</body>
</html>
