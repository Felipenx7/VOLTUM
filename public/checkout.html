<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8">
        <div class="text-center mb-8">
          <div class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">⚡ VOLTUM</div>
          <p class="text-gray-400">Plan PRO - Suscripción Mensual</p>
        </div>

        <!-- Resumen -->
        <div class="bg-purple-500/10 border border-purple-500/30 rounded-2xl p-6 mb-8">
          <div class="flex justify-between mb-4">
            <span class="text-gray-400">Plan PRO Mensual</span>
            <span class="font-bold">$10.000</span>
          </div>
          <div class="flex justify-between mb-4">
            <span class="text-gray-400">Renovación mensual</span>
            <span class="font-bold">Automática</span>
          </div>
          <div class="border-t border-purple-500/20 pt-4 flex justify-between">
            <span class="text-lg font-bold">Total a pagar</span>
            <span class="text-2xl font-black text-pink-400">$10.000 CLP</span>
          </div>
        </div>

        <!-- Formulario Simple -->
        <form id="paymentForm" class="space-y-4">
          <!-- Email -->
          <div>
            <label class="block text-sm text-gray-400 mb-2">Email de facturación</label>
            <input type="email" id="email" placeholder="tu@email.com" required class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          </div>

          <!-- Tarjeta Manual -->
          <div>
            <label class="block text-sm text-gray-400 mb-2">Número de tarjeta</label>
            <input type="text" id="cardNumber" placeholder="4242 4242 4242 4242" maxlength="19" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white" required>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm text-gray-400 mb-2">Vencimiento</label>
              <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white" required>
            </div>
            <div>
              <label class="block text-sm text-gray-400 mb-2">CVC</label>
              <input type="text" id="cvc" placeholder="123" maxlength="4" class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white" required>
            </div>
          </div>

          <div id="error-msg" class="text-red-400 text-sm hidden"></div>

          <!-- Botón -->
          <button type="submit" id="submitBtn" class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold hover:opacity-90 disabled:opacity-50 transition">
            💳 Pagar $10.000 CLP
          </button>

          <p class="text-xs text-gray-500 text-center">
            Modo prueba: 4242 4242 4242 4242 | 12/25 | 123
          </p>
        </form>

        <div class="text-center mt-6">
          <a href="/login.html" class="text-gray-500 hover:text-gray-300">← Volver</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    const stripe = Stripe('pk_test_51TGe6iPRTSKOzouuFUqmaO9vvr55JE2nm5IrhbW1BGSWWFXg1sqlHPgEAf8oOmN8gT8hv6L9Iz7nPyHBQcLO3oni00o26Plnul');
    const form = document.getElementById('paymentForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('error-msg');

    // Formatear número de tarjeta
    document.getElementById('cardNumber').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
      let formattedValue = value.replace(/(\d{4})(?=\d)/g, '$1 ');
      e.target.value = formattedValue;
    });

    // Formatear vencimiento
    document.getElementById('expiry').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length >= 2) {
        value = value.slice(0, 2) + '/' + value.slice(2, 4);
      }
      e.target.value = value;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Procesando...';
      errorMsg.classList.add('hidden');

      const email = document.getElementById('email').value;
      const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
      const expiry = document.getElementById('expiry').value;
      const cvc = document.getElementById('cvc').value;

      if (!email || !cardNumber || !expiry || !cvc) {
        errorMsg.textContent = 'Rellena todos los campos';
        errorMsg.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = '💳 Pagar $10.000 CLP';
        return;
      }

      try {
        // Crear token con Stripe
        const { token, error } = await stripe.createToken('card', {
          number: cardNumber,
          exp_month: expiry.split('/')[0],
          exp_year: '20' + expiry.split('/')[1],
          cvc: cvc
        });

        if (error) {
          errorMsg.textContent = 'Error: ' + error.message;
          errorMsg.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = '💳 Pagar $10.000 CLP';
          return;
        }

        if (token) {
          // Guardar suscripción
          const user = JSON.parse(localStorage.getItem('voltum_user'));
          if (user) {
            user.subscription = {
              active: true,
              stripe_token: token.id,
              paid_at: new Date().toISOString(),
              status: 'active',
              amount: 10000,
              currency: 'CLP'
            };
            localStorage.setItem('voltum_user', JSON.stringify(user));
          }

          alert('✅ ¡PAGO EXITOSO!\n\nTu suscripción PRO está ACTIVADA.\nYa tienes acceso completo a tu dashboard.');
          window.location.href = '/dashboard.html';
        }
      } catch (e) {
        errorMsg.textContent = 'Error: ' + e.message;
        errorMsg.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = '💳 Pagar $10.000 CLP';
      }
    });

    // Protección: si ya pagó, ir al dashboard
    window.addEventListener('load', () => {
      const user = JSON.parse(localStorage.getItem('voltum_user'));
      if (user && user.subscription && user.subscription.active) {
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
