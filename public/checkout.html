<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-gray-900/50 border border-purple-500/30 rounded-2xl p-8">
        <div class="text-center mb-8">
          <div class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mb-2">⚡ VOLTUM</div>
          <p class="text-gray-400">Plan PRO - Suscripción Mensual</p>
        </div>

        <!-- Resumen -->
        <div class="bg-purple-500/10 border border-purple-500/30 rounded-2xl p-6 mb-8">
          <div class="flex justify-between mb-4">
            <span class="text-gray-400">Plan PRO Mensual</span>
            <span class="font-bold">$10.000</span>
          </div>
          <div class="flex justify-between mb-4">
            <span class="text-gray-400">Duración</span>
            <span class="font-bold">1 mes</span>
          </div>
          <div class="border-t border-purple-500/20 pt-4 flex justify-between">
            <span class="text-lg font-bold">Total</span>
            <span class="text-2xl font-black text-pink-400">$10.000 CLP</span>
          </div>
        </div>

        <!-- Formulario Stripe -->
        <form id="paymentForm" class="space-y-4">
          <!-- Email -->
          <div>
            <label class="block text-sm text-gray-400 mb-2">Email</label>
            <input type="email" id="email" required class="w-full px-4 py-2 bg-gray-800 border border-purple-500/30 rounded-lg text-white">
          </div>

          <!-- Card Element -->
          <div>
            <label class="block text-sm text-gray-400 mb-2">Tarjeta de Crédito</label>
            <div id="card-element" class="px-4 py-3 bg-gray-800 border border-purple-500/30 rounded-lg"></div>
            <div id="card-errors" class="text-red-400 text-sm mt-2"></div>
          </div>

          <!-- Botón -->
          <button type="submit" id="submitBtn" class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold hover:opacity-90 disabled:opacity-50">
            💳 Pagar $10.000 CLP
          </button>

          <p class="text-xs text-gray-500 text-center">
            Modo prueba: Usa 4242 4242 4242 4242 | Cualquier fecha futura | Cualquier CVC
          </p>
        </form>

        <div class="text-center mt-6">
          <a href="/login.html" class="text-gray-500 hover:text-gray-300">← Volver atrás</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const stripe = Stripe('pk_test_51TGe6iPRTSKOzouuFUqmaO9vvr55JE2nm5IrhbW1BGSWWFXg1sqlHPgEAf8oOmN8gT8hv6L9Iz7nPyHBQcLO3oni00o26Plnul');
    const elements = stripe.elements();
    const cardElement = elements.create('card');
    cardElement.mount('#card-element');

    const form = document.getElementById('paymentForm');
    const cardErrors = document.getElementById('card-errors');
    const submitBtn = document.getElementById('submitBtn');

    cardElement.addEventListener('change', (event) => {
      cardErrors.textContent = event.error ? event.error.message : '';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Procesando pago...';

      const email = document.getElementById('email').value;

      try {
        const { token } = await stripe.createToken(cardElement, { name: email });

        if (token) {
          const user = JSON.parse(localStorage.getItem('voltum_user'));
          if (user) {
            user.subscription = {
              active: true,
              paid_at: new Date().toISOString(),
              stripe_customer_id: token.id,
              status: 'active',
              amount: 10000,
              currency: 'CLP'
            };
            localStorage.setItem('voltum_user', JSON.stringify(user));
          }

          alert('✅ ¡PAGO EXITOSO!\n\nTu suscripción PRO está activada.\nAcceso completo a tu dashboard.');
          window.location.href = '/dashboard.html';
        } else if (token.error) {
          cardErrors.textContent = token.error.message;
          submitBtn.disabled = false;
          submitBtn.textContent = '💳 Pagar $10.000 CLP';
        }
      } catch (error) {
        cardErrors.textContent = error.message;
        submitBtn.disabled = false;
        submitBtn.textContent = '💳 Pagar $10.000 CLP';
      }
    });
  </script>
</body>
</html>
