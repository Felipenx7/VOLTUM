<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preskit DJ - VOLTUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-b from-black via-purple-900/20 to-black text-white">
  <div class="min-h-screen">
    <!-- NAV -->
    <nav class="bg-black/40 backdrop-blur border-b border-purple-500/20 sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">⚡ VOLTUM</a>
        <div class="flex gap-3">
          <button id="editBtn" onclick="goToDashboard()" class="hidden px-4 py-2 bg-purple-600 rounded-lg font-bold text-sm">✏️ Editar</button>
          <a href="/" class="px-4 py-2 border border-purple-500 rounded-lg font-bold text-sm">← Inicio</a>
        </div>
      </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-12">
      
      <!-- HEADER CON FOTO -->
      <div class="text-center mb-12">
        <div class="w-56 h-56 rounded-full mx-auto mb-8 bg-gradient-to-br from-purple-600 to-pink-600 overflow-hidden border-4 border-purple-500 flex items-center justify-center">
          <img id="djPhoto" src="" alt="DJ" class="w-full h-full object-cover hidden">
          <i id="djIcon" class="fas fa-user text-8xl text-white opacity-30"></i>
        </div>
        
        <h1 id="djName" class="text-5xl font-black mb-2 bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">DJ Name</h1>
        <p id="djHandle" class="text-gray-400 text-xl mb-6">@usuario</p>
        <p id="djBio" class="text-gray-300 max-w-2xl mx-auto text-lg mb-8 leading-relaxed">
          Bio aquí...
        </p>
      </div>

      <!-- REDES SOCIALES -->
      <div id="socialLinks" class="flex justify-center gap-6 mb-16 flex-wrap">
        <!-- Se genera dinámicamente -->
      </div>

      <!-- EQUIPAMIENTO PIONEER -->
      <div id="equipmentSection" class="bg-gradient-to-br from-purple-600/20 to-pink-600/20 border border-purple-500/30 rounded-2xl p-8 mb-12 hidden">
        <h2 class="text-3xl font-bold mb-8">🎛️ Mi Equipamiento Pioneer</h2>
        <div id="equipmentList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          <!-- Se genera dinámicamente -->
        </div>
      </div>

      <!-- GALERÍA DE FOTOS -->
      <div id="gallerySection" class="bg-gradient-to-br from-purple-600/20 to-pink-600/20 border border-purple-500/30 rounded-2xl p-8 mb-12 hidden">
        <h2 class="text-3xl font-bold mb-8">📸 Galería</h2>
        <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
          <!-- Se genera dinámicamente -->
        </div>
      </div>

      <!-- PRÓXIMAS PRESENTACIONES -->
      <div id="eventsSection" class="mb-12 hidden">
        <h2 class="text-3xl font-bold mb-8">📅 Próximas Presentaciones</h2>
        <div id="eventsList" class="space-y-4">
          <!-- Se genera dinámicamente -->
        </div>
      </div>

      <!-- CTA VOLTUM -->
      <div class="bg-gradient-to-r from-purple-600/30 to-pink-600/30 border border-purple-500/30 rounded-2xl p-12 text-center">
        <h2 class="text-3xl font-bold mb-4">¿Quieres tu Preskit así?</h2>
        <p class="text-gray-400 mb-8 text-lg">Crea tu preskit profesional en VOLTUM en 5 minutos. Todo centralizado, visual e impactante.</p>
        <a href="/" class="px-8 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold text-lg inline-block hover:opacity-90 transition">
          ⚡ Crear Mi Preskit
        </a>
      </div>
    </div>
  </div>

  <script>
    const SOCIAL_ICONS = {
      instagram: { icon: 'fab fa-instagram', color: 'from-purple-600 to-pink-600', label: 'Instagram' },
      whatsapp: { icon: 'fab fa-whatsapp', color: 'from-green-600 to-emerald-600', label: 'WhatsApp' },
      spotify: { icon: 'fab fa-spotify', color: 'from-green-600 to-lime-600', label: 'Spotify' },
      email: { icon: 'fas fa-envelope', color: 'from-red-600 to-pink-600', label: 'Email' },
      youtube: { icon: 'fab fa-youtube', color: 'from-red-600 to-orange-600', label: 'YouTube' },
      soundcloud: { icon: 'fab fa-soundcloud', color: 'from-orange-600 to-yellow-600', label: 'SoundCloud' }
    };

    function loadPreskit() {
      const params = new URLSearchParams(window.location.search);
      let username = window.location.pathname.split('/').pop();

      const users = JSON.parse(localStorage.getItem('voltum_users') || '[]');
      const user = users.find(u => u.username === username);

      if (!user) {
        document.body.innerHTML = '<div class="min-h-screen flex items-center justify-center"><div class="text-center"><h1 class="text-4xl font-black text-white mb-4">❌ DJ no encontrado</h1><a href="/" class="text-purple-400 hover:text-purple-300">← Volver al inicio</a></div></div>';
        return;
      }

      const profile = JSON.parse(localStorage.getItem(`profile_${user.id}`) || '{}');
      const equipment = JSON.parse(localStorage.getItem(`equipment_${user.id}`) || '[]');
      const eventos = JSON.parse(localStorage.getItem(`eventos_${user.id}`) || '[]');

      // Verificar si es el dueño
      const currentUser = JSON.parse(localStorage.getItem('voltum_user') || 'null');
      if (currentUser && currentUser.id === user.id) {
        document.getElementById('editBtn').classList.remove('hidden');
      }

      // Cargar datos
      document.getElementById('djName').textContent = profile.artist_name || user.artist_name || 'DJ ' + user.username;
      document.getElementById('djHandle').textContent = '@' + user.username;
      document.getElementById('djBio').textContent = profile.bio || 'Artista de música electrónica profesional';

      // Foto
      if (profile.photo) {
        document.getElementById('djPhoto').src = profile.photo;
        document.getElementById('djPhoto').classList.remove('hidden');
        document.getElementById('djIcon').classList.add('hidden');
      }

      // Redes sociales
      renderSocials(profile);

      // Equipamiento
      if (equipment.length > 0) {
        renderEquipment(equipment);
        document.getElementById('equipmentSection').classList.remove('hidden');
      }

      // Galería
      if (profile.gallery && profile.gallery.length > 0) {
        renderGallery(profile.gallery);
        document.getElementById('gallerySection').classList.remove('hidden');
      }

      // Eventos
      if (eventos.length > 0) {
        renderEvents(eventos);
        document.getElementById('eventsSection').classList.remove('hidden');
      }
    }

    function renderSocials(profile) {
      const container = document.getElementById('socialLinks');
      container.innerHTML = '';

      const socials = [
        { key: 'instagram', url: `https://instagram.com/${profile.instagram?.replace('@', '')}` },
        { key: 'whatsapp', url: `https://wa.me/${profile.whatsapp?.replace(/\D/g, '')}` },
        { key: 'spotify', url: profile.spotify },
        { key: 'email', url: `mailto:${profile.email}` },
        { key: 'youtube', url: profile.youtube },
        { key: 'soundcloud', url: profile.soundcloud }
      ];

      socials.forEach(social => {
        if (profile[social.key] && social.url) {
          const icon = SOCIAL_ICONS[social.key];
          const link = document.createElement('a');
          link.href = social.url;
          link.target = '_blank';
          link.className = `w-16 h-16 bg-gradient-to-br ${icon.color} rounded-full flex items-center justify-center hover:scale-110 transition hover:shadow-lg`;
          link.title = icon.label;
          link.innerHTML = `<i class="${icon.icon} text-2xl"></i>`;
          container.appendChild(link);
        }
      });
    }

    function renderEquipment(equipment) {
      const list = document.getElementById('equipmentList');
      list.innerHTML = '';
      equipment.forEach(eq => {
        const div = document.createElement('div');
        div.className = 'bg-gradient-to-br from-purple-600/30 to-pink-600/30 rounded-lg px-4 py-4 text-center border border-purple-500/30';
        div.innerHTML = `<div class="font-bold text-sm">${eq}</div>`;
        list.appendChild(div);
      });
    }

    function renderGallery(gallery) {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      gallery.forEach(img => {
        const div = document.createElement('div');
        div.className = 'overflow-hidden rounded-lg';
        div.innerHTML = `<img src="${img}" alt="Galería" class="w-full h-48 object-cover hover:scale-105 transition">`;
        grid.appendChild(div);
      });
    }

    function renderEvents(eventos) {
      const list = document.getElementById('eventsList');
      list.innerHTML = '';
      eventos.forEach(ev => {
        const div = document.createElement('div');
        div.className = 'bg-gradient-to-r from-purple-600/20 to-pink-600/20 border border-purple-500/30 rounded-2xl p-6';
        div.innerHTML = `
          <h3 class="text-2xl font-bold mb-3">${ev.name}</h3>
          <div class="space-y-2 text-gray-300 mb-4">
            <p><i class="fas fa-calendar text-purple-400 mr-2"></i>${new Date(ev.date).toLocaleString('es-CL')}</p>
            <p><i class="fas fa-map-marker-alt text-purple-400 mr-2"></i>${ev.location}</p>
            ${ev.desc ? `<p class="mt-3 text-gray-400">${ev.desc}</p>` : ''}
          </div>
          ${ev.link ? `<a href="${ev.link}" target="_blank" class="inline-block px-6 py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg font-bold text-sm hover:opacity-90">🎫 Entradas</a>` : ''}
        `;
        list.appendChild(div);
      });
    }

    function goToDashboard() {
      window.location.href = '/dashboard.html';
    }

    window.addEventListener('load', loadPreskit);
  </script>
</body>
</html>
